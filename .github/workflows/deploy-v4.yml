name: Deploy v4

on:
  push:
    branches: [main]
    paths:
      - "v4/**"
      - ".github/workflows/deploy-v4.yml"
  workflow_dispatch: {}

# Un deploy a la vez; los siguientes esperan en cola
concurrency:
  group: deploy-v4
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/prietodanilo94/turnosclaude-v4
  DEPLOY_HOST: 2.24.83.13
  DEPLOY_USER: root

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: v4/frontend
          push: true
          tags: |
            ghcr.io/prietodanilo94/turnosclaude-v4:latest
            ghcr.io/prietodanilo94/turnosclaude-v4:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to pompeyo
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # La conexión runner→VPS puede fallar transitoriamente: reintentar hasta 5 veces
          for attempt in 1 2 3 4 5; do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 "$DEPLOY_USER@$DEPLOY_HOST" "
              set -e
              cd /opt/shift-optimizer && git pull
              echo '$GH_TOKEN' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
              cd v4
              docker compose pull frontend
              docker compose up -d
              docker logout ghcr.io
              docker image prune -f
              docker ps --filter name=v4-frontend --format 'DEPLOYED: {{.Names}} {{.Status}}'
            "; then
              echo "Deploy OK en intento $attempt"
              exit 0
            fi
            echo "Intento $attempt falló; reintentando en 30s..."
            sleep 30
          done
          echo "Deploy falló tras 5 intentos"
          exit 1
