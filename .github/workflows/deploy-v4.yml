name: Deploy v4

on:
  push:
    branches: [main]
    paths:
      - "v4/**"
      - ".github/workflows/deploy-v4.yml"
  workflow_dispatch: {}

# Un deploy a la vez; los siguientes esperan en cola
concurrency:
  group: deploy-v4
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/prietodanilo94/turnosclaude-v4
  DEPLOY_HOST: 2.24.83.13
  DEPLOY_USER: root
  # El firewall de pompeyo bloquea rangos de Azure (runners de GitHub):
  # si la conexión directa falla, se salta vía antigravity como ProxyJump.
  JUMP_HOST: 173.212.220.77

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: v4/frontend
          push: true
          tags: |
            ghcr.io/prietodanilo94/turnosclaude-v4:latest
            ghcr.io/prietodanilo94/turnosclaude-v4:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to pompeyo
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Config por host: con ProxyJump las opciones -o del comando NO aplican
          # al salto intermedio, por eso cada host se configura aquí.
          cat > ~/.ssh/config <<EOF
          Host jump
            HostName $JUMP_HOST
            User $DEPLOY_USER
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ConnectTimeout 20
          Host target-direct
            HostName $DEPLOY_HOST
            User $DEPLOY_USER
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ConnectTimeout 20
          Host target-jump
            HostName $DEPLOY_HOST
            User $DEPLOY_USER
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ConnectTimeout 20
            ProxyJump jump
          EOF
          DEPLOY_SCRIPT="
            set -e
            cd /opt/shift-optimizer && git pull
            echo '$GH_TOKEN' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            cd v4
            docker compose pull frontend
            docker compose up -d
            docker logout ghcr.io
            docker image prune -f
            docker ps --filter name=v4-frontend --format 'DEPLOYED: {{.Names}} {{.Status}}'
          "
          # Directo primero; si el firewall bloquea al runner, saltar vía antigravity
          for mode in target-direct target-jump target-direct target-jump target-jump; do
            echo "Intentando $mode..."
            if ssh "$mode" "$DEPLOY_SCRIPT"; then
              echo "Deploy OK (modo: $mode)"
              exit 0
            fi
            echo "$mode falló; reintentando en 15s..."
            sleep 15
          done
          echo "Deploy falló en todos los modos"
          exit 1
