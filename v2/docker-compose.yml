services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APPWRITE_ENDPOINT: ${NEXT_PUBLIC_APPWRITE_ENDPOINT}
        NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${NEXT_PUBLIC_APPWRITE_PROJECT_ID}
        NEXT_PUBLIC_APPWRITE_DATABASE_ID: ${NEXT_PUBLIC_APPWRITE_DATABASE_ID:-main-v2}
        NEXT_PUBLIC_OPTIMIZER_URL: ${NEXT_PUBLIC_OPTIMIZER_URL}
    ports:
      - "127.0.0.1:3011:3000"
    environment:
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID:-main-v2}
      - NEXT_PUBLIC_APPWRITE_ENDPOINT=${NEXT_PUBLIC_APPWRITE_ENDPOINT}
      - NEXT_PUBLIC_APPWRITE_PROJECT_ID=${NEXT_PUBLIC_APPWRITE_PROJECT_ID}
      - NEXT_PUBLIC_APPWRITE_DATABASE_ID=${NEXT_PUBLIC_APPWRITE_DATABASE_ID:-main-v2}
      - NEXT_PUBLIC_OPTIMIZER_URL=${NEXT_PUBLIC_OPTIMIZER_URL}
    depends_on:
      - optimizer
    restart: unless-stopped

  optimizer:
    build: ./backend
    ports:
      - "127.0.0.1:8021:8000"
    environment:
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID:-main-v2}
      - OPTIMIZER_TIME_LIMIT_SECONDS=${OPTIMIZER_TIME_LIMIT_SECONDS:-30}
      - OPTIMIZER_DEFAULT_NUM_PROPOSALS=${OPTIMIZER_DEFAULT_NUM_PROPOSALS:-3}
    restart: unless-stopped
